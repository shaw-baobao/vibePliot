name: Release

on:
  workflow_dispatch:
    inputs:
      timezone:
        description: Timezone used for date-based versioning
        required: false
        default: Asia/Shanghai
      run_tests:
        description: Run swift tests before packaging
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: vibepilot-release
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        shell: bash
        env:
          TZ: ${{ inputs.timezone }}
        run: |
          set -euo pipefail

          date_part="$(date +%Y%m%d)"
          prefix="v0.${date_part}."

          last_n="$(
            git tag -l "${prefix}*" \
              | sed -E "s/^v0\.${date_part}\.([0-9]+)$/\1/" \
              | sort -n \
              | tail -1
          )"

          if [[ -z "${last_n:-}" ]]; then
            next_n=1
          else
            next_n=$((last_n + 1))
          fi

          version="0.${date_part}.${next_n}"
          build_number="${date_part}${next_n}"
          tag="v${version}"

          echo "date_part=${date_part}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "build_number=${build_number}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          echo "Computed release version: ${version}"

      - name: Update version.env
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
        run: |
          set -euo pipefail
          sed -i '' -E "s/^VERSION=.*/VERSION=${VERSION}/" Scripts/version.env
          sed -i '' -E "s/^BUILD_NUMBER=.*/BUILD_NUMBER=${BUILD_NUMBER}/" Scripts/version.env
          echo "Updated Scripts/version.env"
          cat Scripts/version.env

      - name: Run tests
        if: ${{ inputs.run_tests }}
        run: swift test

      - name: Build release zip
        run: Scripts/release.sh

      - name: Commit version bump and create tag
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Scripts/version.env
          if ! git diff --cached --quiet; then
            git commit -m "chore: release ${TAG}"
            git push origin HEAD:main
          else
            echo "No version.env changes to commit."
          fi

          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          asset_path="build/VibePilot-v${VERSION}.zip"
          if [[ ! -f "${asset_path}" ]]; then
            echo "Missing release asset: ${asset_path}"
            exit 1
          fi

          gh release create "${TAG}" "${asset_path}" \
            --title "${TAG}" \
            --generate-notes

